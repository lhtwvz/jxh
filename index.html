<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Happy Birthday, Jordan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="home">
  <main class="stage">
    <div class="silver-confetti" aria-hidden="true"></div>
    <section class="intro">
      <h1>HAPPY BIRTHDAY, JORDAN!</h1>
      <p class="subtitle"><span></span> we&rsquo;re going somewhere <span></span></p>
      <button class="envelope-button" id="openEnvelope" aria-label="Open envelope">
        <div class="envelope" aria-hidden="true">
          <div class="ticket-peek"></div>
          <div class="back"></div>
          <div class="flap"></div>
          <div class="front-left"></div>
          <div class="front-right"></div>
          <div class="seal"><div class="cake">🎂</div><div class="x">×</div></div>
          <div class="open-label">OPEN HERE</div>
        </div>
      </button>
    </section>
    <div class="fade-screen" id="fadeScreen"></div>
  </main>
  <script src="script.js"></script>
</body>
</html>
