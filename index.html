<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Happy Birthday Jordan</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="cover-page">
  <main class="cover-wrap">
    <button class="cover-button" id="openEnvelope" aria-label="Open here">
      <img src="assets/cover.png" alt="Happy Birthday Jordan envelope invitation">
    </button>

    <section class="reveal-steps" aria-label="What happens when you open it">
      <p>🎂 The wax seal pops away.</p>
      <p>📬 The envelope opens.</p>
      <p>🌑 The screen fades to black.</p>
      <p>✨ The concert ticket appears with a subtle shimmer.</p>
    </section>
  </main>

  <div class="fade-screen" id="fadeScreen"></div>
  <script src="script.js"></script>
</body>
</html>
