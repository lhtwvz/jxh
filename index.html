<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Birthday Envelope</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="envelope-stage">
    <button class="envelope-button" id="openSeal" aria-label="Open envelope">
      <img class="envelope-img" src="assets/envelope.png" alt="Birthday envelope">
      <span class="seal-hotspot"></span>
      <span class="silver-glimmer" aria-hidden="true"></span>
    </button>
    <div class="fade-screen" id="fadeScreen"></div>
  </main>
  <script src="script.js"></script>
</body>
</html>
