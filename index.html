<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Happy Birthday Jordan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="stage">
    <div class="silver-confetti" aria-hidden="true"></div>

    <section class="hero" id="hero">
      <div class="envelope">
        <div class="env-shadow"></div>
        <div class="env-back"></div>
        <div class="env-inside">
          <div class="silver-glow"></div>
          <span class="spark s1"></span>
          <span class="spark s2"></span>
          <span class="spark s3"></span>
          <span class="spark s4"></span>
          <span class="spark s5"></span>
          <span class="spark s6"></span>
        </div>

        <div class="env-flap">
          <h1 class="shimmer-title">HAPPY<br>BIRTHDAY,<br>JORDAN!</h1>
        </div>

        <div class="env-front-left"></div>
        <div class="env-front-right"></div>

        <button class="seal-button" id="openSeal" aria-label="Open birthday envelope">
          <span class="seal">
            <svg class="asl-r-icon" viewBox="0 0 120 120" aria-hidden="true">
              <path d="M44 94c-8-8-12-20-12-34V43c0-5 4-9 9-9s9 4 9 9v26" />
              <path d="M50 68V27c0-5 4-9 9-9s9 4 9 9v42" />
              <path d="M68 68V34c0-5 4-9 9-9s9 4 9 9v39c0 17-12 29-29 29h-9" />
              <path d="M50 31c10 2 22 13 36 0" />
              <path d="M39 69c8-5 18-4 25 4" />
            </svg>
          </span>
        </button>
      </div>
    </section>

    <div class="fade-screen" id="fadeScreen"></div>
  </main>

  <script src="script.js"></script>
</body>
</html>
