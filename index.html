<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Birthday Ticket Reveal</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; font-family: Arial, Helvetica, sans-serif;
    background: radial-gradient(circle at top, #262626 0%, #050505 55%, #000 100%);
    color: white; display: grid; place-items: center; overflow-x: hidden;
  }
  .wrap { width: min(1000px, 94vw); text-align: center; padding: 40px 0; }
  .eyebrow { letter-spacing: .24em; font-size: .82rem; opacity: .75; text-transform: uppercase; }
  h1 { font-size: clamp(2rem, 7vw, 5rem); margin: 14px 0 4px; line-height: .95; animation: glow 2.8s ease-in-out infinite alternate; }
  .msg { font-size: clamp(1.2rem, 3.5vw, 2.2rem); margin: 0 0 26px; }
  .ticket { width: 100%; border-radius: 22px; box-shadow: 0 24px 80px rgba(255,255,255,.16); opacity: 0; transform: translateY(28px) scale(.98); animation: reveal 1.2s ease .45s forwards; }
  .actions { margin-top: 26px; display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
  a.button { color:#000; background:#fff; padding: 13px 18px; border-radius:999px; font-weight:700; text-decoration:none; }
  .love { margin-top:18px; opacity:.82; }
  .confetti span { position: fixed; top: -20px; width: 9px; height: 14px; background: white; opacity: .8; animation: fall linear infinite; }
  @keyframes reveal { to { opacity: 1; transform: translateY(0) scale(1); } }
  @keyframes glow { from { text-shadow: 0 0 8px rgba(255,255,255,.18); } to { text-shadow: 0 0 28px rgba(255,255,255,.55); } }
  @keyframes fall { to { transform: translateY(110vh) rotate(720deg); } }
</style>
</head>
<body>
<div class="confetti" aria-hidden="true"></div>
<main class="wrap">
  <div class="eyebrow">Surprise</div>
  <h1>Happy Birthday!</h1>
  <p class="msg">We’re going!</p>
  <img class="ticket" src="ticket.png" alt="Concert ticket for JAŸ-Z30 at SoFi Stadium" />
  <div class="actions">
    <a class="button" href="ticket.pdf">Open PDF Ticket</a>
    <a class="button" href="ticket.png">View Full Ticket</a>
  </div>
  <p class="love">love always, rochelle</p>
</main>
<script>
  const c = document.querySelector('.confetti');
  for (let i = 0; i < 34; i++) {
    const s = document.createElement('span');
    s.style.left = Math.random() * 100 + 'vw';
    s.style.animationDuration = (4 + Math.random() * 5) + 's';
    s.style.animationDelay = (Math.random() * 4) + 's';
    s.style.opacity = .35 + Math.random() * .6;
    c.appendChild(s);
  }
</script>
</body>
</html>
