<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Happy Birthday Jordan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="stage">
    <div class="confetti" aria-hidden="true"></div>

    <section class="hero" id="hero">
      <div class="envelope" id="envelope">
        <div class="back"></div>
        <div class="inside">
          <span class="spark s1"></span>
          <span class="spark s2"></span>
          <span class="spark s3"></span>
          <span class="spark s4"></span>
        </div>

        <div class="flap">
          <h1 class="shimmer-title">HAPPY<br>BIRTHDAY,<br>JORDAN!</h1>
        </div>

        <div class="front-left"></div>
        <div class="front-right"></div>

        <button class="seal-button" id="openSeal" aria-label="Open envelope">
          <span class="seal">
            <svg viewBox="0 0 100 100" class="hand-icon" aria-hidden="true">
              <path d="M35 78c-6-7-8-14-8-26V37c0-4 3-7 7-7s7 3 7 7v18" />
              <path d="M41 54V24c0-4 3-7 7-7s7 3 7 7v31" />
              <path d="M55 55V27c0-4 3-7 7-7s7 3 7 7v36c0 14-9 25-23 25h-5" />
              <path d="M41 28c8 2 18 10 28 0" />
            </svg>
          </span>
        </button>
      </div>
      <p class="tap-note">tap the seal to open</p>
    </section>

    <div class="fade-screen" id="fadeScreen"></div>
  </main>
  <script src="script.js"></script>
</body>
</html>
